version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
    revive:
      rules:
        - name: exported
          severity: warning
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - durationcheck
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - godot
    - mnd
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - revive
    - tparallel
    - unconvert
    - unparam
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec

formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/hashgraph-online/standards-sdk-go
  enable:
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
